<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <title>Cancionero Joven Mengíbar</title>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --a: #f39c12; --d: #e74c3c; --l: #ffffff; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #333; padding-bottom: 70px; }
        .logo-main { width: 140px; margin-bottom: 20px; }
        #gatekeeper { position: fixed; inset: 0; background: #840202 ; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; text-align: center; }
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 500; height: 65px; }
        nav button { flex: 1; border: none; background: none; font-size: 11px; font-weight: bold; color: #999; }
        nav button.active { color: var(--p); border-top: 4px solid var(--p); }
        .container { max-width: 800px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .section.active { display: block; }
        .song-display { background: white; color: black; padding: 25px; border-radius: 12px; border: 1px solid #eee; font-family: 'Fira Code', monospace; line-height: 1.6; min-height: 300px; }
        .mode-instru .song-display { font-size: clamp(12px, 2.5vw, 16px); white-space: pre-wrap; }
        .mode-canto .song-display { font-size: clamp(14px, 3vw, 18px); white-space: pre-wrap; }
        .editor-box { background: white; border: 1px solid #ccc; min-height: 200px; padding: 15px; font-family: 'Fira Code', monospace; outline: none; border-radius: 8px; white-space: pre-wrap; margin-bottom: 15px;}
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .btn-ok { background: var(--p); color: white; }
        .btn-action { background: var(--s); color: white; }
        .btn-cancel { background: #eee; color: #555; }
        .tag { font-size: 10px; background: #e8f4f8; padding: 4px 8px; border-radius: 4px; color: var(--p); font-weight: bold; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        #pdf-container { display: none; background: white; padding: 20px; font-family: 'Fira Code', monospace; }
        .admin-only, .instru-only { display: none; }
    </style>
</head>
<body class="mode-canto">

<div id="gatekeeper">
    <img src= "Logo Coro Juvenil (W).svg" class="logo-main">
    <h2>Cancionero Juvenil Parroquial</h2>
    <h3>Iglesia en Mengíbar</h3>
    <input type="password" id="pass-entrada" placeholder="Contraseña...">
    <button onclick="checkAccess()" class="btn btn-ok" style="width:200px">Entrar</button>
</div>

<img src="Logo Coro Juvenil (W).svg" id="app-logo" style="position:fixed; top:15px; right:15px; width:45px; z-index:1000; display:none;">

<div class="container" id="main-content" style="display:none">
    
    <div id="sec-songs" class="section active">
        <h3>📚 Repertorio</h3>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="search" placeholder="🔍 Buscar..." onkeyup="renderSongsList()" style="margin:0; flex:2;">
            <select id="filter-style" onchange="renderSongsList()" style="margin:0; flex:1;">
                <option value="Todos">Todos</option>
            </select>
        </div>
        <div style="display:flex; gap:5px">
            <button class="admin-only btn btn-ok" onclick="openSongForm()">+ Nueva</button>
            <button class="btn btn-action" onclick="generateAllPDF()">📄 PDF Completo</button>
        </div>
        <div id="list-songs"></div>
    </div>

    <div id="sec-misas" class="section">
        <h3>⛪ Misas</h3>
        <div id="list-misas"></div>
        <button class="admin-only btn btn-ok" onclick="createNewMisa()">+ Crear Misa</button>
    </div>

    <div id="sec-misa-detail" class="section">
        <button onclick="showSection('misas')" class="btn btn-cancel" style="width:auto">⬅ Volver</button>
        <h2 id="misa-name"></h2>
        <div style="display:flex; gap:5px">
            <button class="btn btn-action" onclick="generateMisaPDF('list')">PDF Lista</button>
            <button class="btn btn-action" onclick="generateMisaPDF('both')">PDF Letras</button>
        </div>
        <div id="misa-songs-order"></div>
        <div class="admin-only" style="background:#fff; padding:15px; border-radius:10px; border:1px solid #ddd">
            <h4>Gestionar Canto</h4>
            <select id="song-to-add"></select>
            <button onclick="addSongToMisa()" class="btn btn-ok">Añadir</button>
            <button onclick="deleteMisa()" class="btn" style="color:red; background:none">Eliminar Misa</button>
        </div>
    </div>

    <div id="sec-view-song" class="section">
        <button onclick="goBack()" class="btn btn-cancel" style="width:auto">⬅ Volver</button>
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 id="v-title"></h2>
            <button class="btn btn-action" onclick="downloadSinglePDF()" style="width:auto">📄 PDF</button>
        </div>
        <span id="v-tag" class="tag"></span> <span id="v-cejilla" class="tag instru-only" style="background:var(--a); color:white"></span>
        <div id="v-content" class="song-display" style="margin-top:15px"></div>
        <div class="admin-only">
            <button class="btn" onclick="editSong()" style="background:var(--a); color:white">✏️ Editar</button>
        </div>
    </div>

    <div id="sec-form-song" class="section">
        <h3>Editor</h3>
        <input type="text" id="f-title" placeholder="Título">
        <input type="number" id="f-cejilla" placeholder="Cejilla">
        <select id="f-style"></select>
        <div id="f-content-canto" class="editor-box" contenteditable="true"></div>
        <div id="f-content-instru" class="editor-box" contenteditable="true"></div>
        <button onclick="saveSong()" class="btn btn-ok">💾 Sincronizar Nube</button>
        <button onclick="showSection('songs')" class="btn btn-cancel">Cancelar</button>
    </div>

    <div id="sec-settings" class="section">
        <h3>⚙️ Ajustes</h3>
        <p id="mode-status"></p>
        <button onclick="logoutApp()" class="btn btn-cancel" style="border: 1px solid #ccc; margin-bottom: 20px;">🚪 Cerrar Sesión</button>
        <div class="instru-only">
            <button onclick="loginAdmin()" id="btn-login-admin" class="btn btn-ok">Modo Edición</button>
            <button onclick="logoutAdmin()" id="btn-logout-admin" class="btn btn-cancel" style="display:none">Cerrar Edición</button>
        </div>
    </div>

</div>
    
<nav id="nav-bar" style="display:none">
    <button id="tab-songs" onclick="showSection('songs')" class="active">CANCIONES</button>
    <button id="tab-misas" onclick="showSection('misas')">MISAS</button>
    <button id="tab-settings" onclick="showSection('settings')">AJUSTES</button>
</nav>

<div id="pdf-container"></div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCm_U5XkQZ5nJ-stzmIYEZXpMUUwLFf4EE",
        authDomain: "cancionero-juvenil-parroquial.firebaseapp.com",
        projectId: "cancionero-juvenil-parroquial",
        storageBucket: "cancionero-juvenil-parroquial.firebasestorage.app",
        messagingSenderId: "1013357948678",
        appId: "1:1013357948678:web:15bb29840934e793aa3887",
        measurementId: "G-NFRZGNHTQ6",
        databaseURL: "https://cancionero-juvenil-parroquial-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- SEGURIDAD (CAMBIA ESTO) ---
    const PASS_CANTO = "canto2026";     // <--- TU NUEVA CLAVE CANTANTES
    const PASS_INSTRU = "instru2026";   // <--- TU NUEVA CLAVE INSTRUMENTOS
    const ADMIN_PINS = { "1111": "Miguel Ángel", "2222": "Carlos" }; // <--- TUS PINS DE EDICIÓN

    let songs = [], misas = [], styles = ["Entrada", "Piedad", "Gloria", "Salmo", "Aleluya", "Ofertorio", "Santo", "Paz", "Comunión", "Salida"], logs = [];
    let viewMode = 'canto', currentUser = null, currentMisaIdx = null, currentSongIdx = null;

    db.ref('data').on('value', snap => {
        const v = snap.val(); if(v){ songs=v.songs||[]; misas=v.misas||[]; logs=v.logs||[]; renderSongsList(); renderMisas(); updateMisaSongSelector(); if(currentMisaIdx!==null) renderMisaSongs(); }
    });

    // --- LÓGICA DE SESIÓN (RECUERDA Y CIERRA A LAS 00:00) ---
    function getTodayString() {
        return new Date().toLocaleDateString(); // Devuelve la fecha actual, ej: "31/3/2026"
    }

    function checkSavedSession() {
        const savedMode = localStorage.getItem('coroViewMode');
        const savedDate = localStorage.getItem('coroDate');
        
        // Si hay sesión guardada y es del mismo día, entra directo
        if(savedMode && savedDate === getTodayString()) {
            viewMode = savedMode;
            enterApp();
        }
    }

    function checkAccess() {
        const p = document.getElementById('pass-entrada').value;
        if(p === PASS_CANTO) { viewMode = 'canto'; saveSessionAndEnter(); }
        else if(p === PASS_INSTRU) { viewMode = 'instru'; saveSessionAndEnter(); }
        else alert("Clave incorrecta");
    }

    function saveSessionAndEnter() {
        localStorage.setItem('coroViewMode', viewMode);
        localStorage.setItem('coroDate', getTodayString());
        enterApp();
    }

    function logoutApp() {
        localStorage.removeItem('coroViewMode');
        localStorage.removeItem('coroDate');
        location.reload(); // Recarga la página para volver a pedir contraseña
    }

    function enterApp() {
        document.body.className = 'mode-' + viewMode;
        document.getElementById('gatekeeper').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('nav-bar').style.display = 'flex';
        document.getElementById('app-logo').style.display = 'block'; // Muestra el logo
        document.getElementById('mode-status').innerText = "Viendo como: " + viewMode;
        updateSelects(); updateUI();
    }

    // --- FILTROS Y BÚSQUEDA ---
    function updateSelects() {
        const ops = styles.map(s => `<option value="${s}">${s}</option>`).join("");
        document.getElementById('f-style').innerHTML = ops;
        document.getElementById('filter-style').innerHTML = `<option value="Todos">Todos</option>` + ops;
    }

    function renderSongsList() {
        const q = document.getElementById('search').value.toLowerCase();
        const f = document.getElementById('filter-style').value; // Lee el filtro
        const list = document.getElementById('list-songs'); list.innerHTML = "";
        
        songs.forEach((s, i) => {
            const matchSearch = s.title.toLowerCase().includes(q);
            const matchStyle = (f === "Todos" || s.style === f);
            
            if(matchSearch && matchStyle) {
                const d = document.createElement('div'); d.className = 'card';
                d.innerHTML = `<b>${s.title}</b> <span class="tag">${s.style}</span>`;
                d.onclick = () => { currentSongIdx=i; viewSong(i); };
                list.appendChild(d);
            }
        });
    }

    // Ejecutamos la comprobación de sesión nada más cargar
    checkSavedSession();

    function sync() { db.ref('data').set({ songs, misas, logs }); }
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        let t = id; if(id==='view-song'||id==='form-song') t='songs'; if(id==='misa-detail') t='misas';
        document.getElementById('tab-'+t).classList.add('active');
    }


    function viewSong(i) {
        const s = songs[i];
        document.getElementById('v-title').innerText = s.title;
        document.getElementById('v-tag').innerText = s.style;
        document.getElementById('v-cejilla').innerText = "Cejilla: " + (s.cejilla || 0);
        document.getElementById('v-content').innerHTML = (viewMode==='instru') ? (s.contentInstru || s.contentCanto) : s.contentCanto;
        showSection('view-song');
    }

    function saveSong() {
        const s = { title: document.getElementById('f-title').value, style: document.getElementById('f-style').value, cejilla: document.getElementById('f-cejilla').value, contentCanto: document.getElementById('f-content-canto').innerHTML, contentInstru: document.getElementById('f-content-instru').innerHTML };
        if(currentSongIdx!==null) songs[currentSongIdx]=s; else songs.push(s);
        sync(); showSection('songs');
    }

    function renderMisas() {
        const l = document.getElementById('list-misas'); l.innerHTML = "";
        misas.forEach((m, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<b>${m.name}</b> <span class="tag">${m.items?m.items.length:0} cantos</span>`;
            d.onclick = () => { currentMisaIdx=i; document.getElementById('misa-name').innerText=m.name; renderMisaSongs(); showSection('misa-detail'); };
            l.appendChild(d);
        });
    }

    function renderMisaSongs() {
        const c = document.getElementById('misa-songs-order'); c.innerHTML = "";
        const m = misas[currentMisaIdx]; if(!m.items) m.items = [];
        m.items.forEach((sIdx, pos) => {
            const s = songs[sIdx]; if(!s) return;
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `• ${s.title} <button class="admin-only" onclick="removeFromMisa(${pos})" style="color:red; background:none; border:none">✖</button>`;
            d.onclick = (e) => { if(e.target.tagName!=='BUTTON') { currentSongIdx=sIdx; viewSong(sIdx); }};
            c.appendChild(d);
        });
    }

    function addSongToMisa() { misas[currentMisaIdx].items.push(parseInt(document.getElementById('song-to-add').value)); sync(); }
    function removeFromMisa(p) { misas[currentMisaIdx].items.splice(p,1); sync(); }
    function createNewMisa() { const n = prompt("Nombre:"); if(n){ misas.push({name:n, items:[]}); sync(); } }
    function deleteMisa() { if(confirm("¿Borrar?")){ misas.splice(currentMisaIdx, 1); sync(); showSection('misas'); } }

    function loginAdmin() { const p = prompt("PIN:"); if(ADMIN_PINS[p]){ currentUser=ADMIN_PINS[p]; updateUI(); } }
    function logoutAdmin() { currentUser=null; updateUI(); }
    function updateUI() {
        const adm = currentUser !== null;
        document.querySelectorAll('.admin-only').forEach(e => e.style.display = adm ? 'block' : 'none');
        document.querySelectorAll('.instru-only').forEach(e => e.style.display = viewMode==='instru' ? 'inline-block' : 'none');
        document.getElementById('btn-login-admin').style.display = adm ? 'none' : 'block';
        document.getElementById('btn-logout-admin').style.display = adm ? 'block' : 'none';
    }
    
    function updateMisaSongSelector() {
        const s = document.getElementById('song-to-add'); if(s) s.innerHTML = songs.map((x,i) => `<option value="${i}">${x.title}</option>`).join("");
    }
    function goBack() { showSection('songs'); }

    // --- PDF ENGINE ---
    const opt = { margin: 10, filename: 'coro.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    function buildHTML(s) {
        let c = viewMode==='instru' ? (s.contentInstru||s.contentCanto) : s.contentCanto;
        return `<div style="page-break-inside:avoid"><h2>${s.title}</h2><p>${s.style}</p><div style="white-space:pre-wrap; font-family:monospace">${c}</div></div><hr>`;
    }
    function downloadSinglePDF() {
        const p = document.getElementById('pdf-container'); p.innerHTML = buildHTML(songs[currentSongIdx]);
        p.style.display='block'; html2pdf().set(opt).from(p).save().then(()=>p.style.display='none');
    }
    function generateMisaPDF(type) {
        const p = document.getElementById('pdf-container'); let h = `<h1>${misas[currentMisaIdx].name}</h1>`;
        if(type==='list' || type==='both') h += "<ul>" + misas[currentMisaIdx].items.map(i=>`<li>${songs[i].title}</li>`).join("") + "</ul>";
        if(type==='both') { h += "<div style='page-break-after:always'></div>"; misas[currentMisaIdx].items.forEach(i=> h+=buildHTML(songs[i])); }
        p.innerHTML = h; p.style.display='block'; html2pdf().set(opt).from(p).save().then(()=>p.style.display='none');
    }

    async function generateAllPDF() {
        const p = document.getElementById('pdf-container'); 
        
        // 1. Ordenar Canciones por Estilo (según tu array 'styles') y luego alfabéticamente
        let contentSongs = [...songs].sort((a, b) => {
            let styleDiff = styles.indexOf(a.style) - styles.indexOf(b.style);
            if (styleDiff !== 0) return styleDiff; // Primero por estilo
            return a.title.localeCompare(b.title); // Segundo por título
        });

        // 2. Asignar un "Número de Canto" definitivo basado en este orden
        contentSongs.forEach((s, index) => s.numeroCanto = index + 1);

        // 3. Crear el Índice Alfabético Puro
        let indexSongs = [...contentSongs].sort((a,b) => a.title.localeCompare(b.title));
        let h = `<div style="text-align:center; margin-bottom:30px;">
                    <h1>Cancionero Juvenil</h1>
                    <p>Coro Parroquial Mengíbar</p>
                 </div>
                 <h2>Índice Alfabético</h2>
                 <ul style="column-count: 2; font-size: 14px; line-height: 1.8; list-style-type: none; padding: 0;">`;
        
        indexSongs.forEach(s => {
            // Se muestra el Título y al lado, en negrita, el número de canto
            h += `<li><b>${s.numeroCanto}.</b> ${s.title} <span style="color:#888; font-size:10px;">(${s.style})</span></li>`;
        });
        h += `</ul><div style="page-break-after:always"></div>`; // Salto de página

        // 4. Generar el contenido de las canciones
        let currentStyle = "";
        contentSongs.forEach(s => {
            let pageBreak = "";
            if (s.style !== currentStyle) {
                if (currentStyle !== "") pageBreak = `<div style="page-break-before:always"></div>`;
                currentStyle = s.style;
            }

            let c = viewMode==='instru' ? (s.contentInstru||s.contentCanto) : s.contentCanto;
            
            h += `${pageBreak}
                  <div style="page-break-inside:avoid; position:relative; margin-bottom:40px;">
                     <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--p); padding-bottom:5px; margin-bottom:15px;">
                         <span style="font-weight:bold; color:#666; text-transform:uppercase; font-size:12px;">${s.style}</span>
                         <img src="Logo Coro Juvenil (W).svg" style="height:30px;">
                     </div>
                     <h2 style="margin-top:0;"><span style="color:var(--s);">${s.numeroCanto}.</span> ${s.title}</h2>
                     <div style="white-space:pre-wrap; font-family:'Fira Code', monospace;">${c}</div>
                  </div>`;
        });

        p.innerHTML = h; 
        p.style.display='block'; 

        // 5. Configuración avanzada del PDF (Márgenes y paginación)
        const opt = { 
            margin: [15, 15, 20, 15], 
            filename: 'Cancionero_Coro_Mengibar.pdf', 
            html2canvas: { scale: 2 }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
        };

        // Generamos el PDF e inyectamos los números de página al pie
        html2pdf().set(opt).from(p).toPdf().get('pdf').then(function (pdf) {
            const totalPages = pdf.internal.getNumberOfPages();
            for (let i = 1; i <= totalPages; i++) {
                pdf.setPage(i);
                pdf.setFontSize(10);
                pdf.setTextColor(150);
                pdf.text('Página ' + i, 105, 287, { align: 'center' });
            }
        }).save().then(() => p.style.display='none');
    }

    
    function openSongForm(i=null) {
        currentSongIdx = i;
        if(i!==null){
            const s = songs[i]; document.getElementById('f-title').value=s.title; document.getElementById('f-cejilla').value=s.cejilla;
            document.getElementById('f-content-canto').innerHTML=s.contentCanto; document.getElementById('f-content-instru').innerHTML=s.contentInstru;
        } else {
            document.getElementById('f-title').value=""; document.getElementById('f-cejilla').value=0;
            document.getElementById('f-content-canto').innerHTML=""; document.getElementById('f-content-instru').innerHTML="";
        }
        showSection('form-song');
    }
    function editSong() { openSongForm(currentSongIdx); }
</script>
</body>
</html>
